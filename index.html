<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Замеры помещений + Фото</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #000; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 8px; }
        .loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; z-index: 1000; transition: opacity .3s; }
        .loading-screen.hidden { opacity: 0; pointer-events: none; }
        .app-container { width: 100%; max-width: 500px; height: 90vh; background: #0c0c0c; border-radius: 28px; border: 1px solid #222; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .content-area { flex: 1; overflow-y: auto; padding: 16px; }
        .screen { display: none; }
        .screen.active { display: block; }
        button { width: 100%; padding: 14px; background: #36FF00; border: none; border-radius: 60px; font-size: 18px; font-weight: 600; color: #000; cursor: pointer; transition: .2s; margin-top: 12px; }
        button:disabled { background: #2a2a2a; color: #666; cursor: not-allowed; }
        .address-item { background: #1a1a1a; border-radius: 16px; padding: 16px; margin-bottom: 10px; border: 1px solid #333; cursor: pointer; transition: .2s; display: flex; justify-content: space-between; align-items: center; }
        .address-item:hover, .address-item.selected { border-color: #36FF00; background: #222; }
        .address-title { font-size: 16px; font-weight: 500; }
        .edit-icon { font-size: 20px; opacity: 0.7; margin-left: 10px; }
        .form-card { background: #1a1a1a; border-radius: 20px; padding: 12px; margin-bottom: 16px; border: 1px solid #333; position: relative; }
        .form-card .block-number { font-size: 12px; color: #36FF00; margin-bottom: 10px; font-weight: 600; }
        .grid-3cols { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .full-width { margin-bottom: 10px; }
        label { display: block; font-size: 11px; color: #aaa; margin-bottom: 4px; }
        input, select, textarea { width: 100%; padding: 10px; background: #0c0c0c; border: 1px solid #333; border-radius: 14px; font-size: 14px; color: #fff; outline: none; font-family: inherit; }
        input:focus, select:focus, textarea:focus { border-color: #36FF00; }
        textarea { resize: vertical; min-height: 60px; }
        .double-select { display: flex; gap: 10px; margin-bottom: 10px; }
        .double-select > div { flex: 1; }
        .remove-block { position: absolute; top: 8px; right: 12px; background: #ff4646; border: none; border-radius: 20px; padding: 4px 10px; font-size: 12px; font-weight: bold; color: #fff; cursor: pointer; width: auto; margin: 0; }
        .remove-block:hover { background: #ff6666; }
        .status { margin-top: 12px; padding: 10px; border-radius: 60px; text-align: center; display: none; background: #1a1a1a; border: 1px solid #333; }
        .status.success { display: block; background: rgba(54,255,0,.15); color: #36FF00; border-color: #36FF00; }
        .status.error { display: block; background: rgba(255,70,70,.15); color: #ff4646; border-color: #ff4646; }
        .connection-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.92); display: none; align-items: center; justify-content: center; padding: 16px; z-index: 2000; }
        .connection-overlay.show { display: flex; }
        .connection-card { width: 100%; max-width: 420px; background: #0c0c0c; border: 1px solid #222; border-radius: 24px; padding: 16px; }
        .connection-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
        .connection-hint { color: #aaa; font-size: 13px; margin-bottom: 12px; }
        .connection-actions { display: flex; gap: 8px; margin-top: 8px; }
        .connection-actions button { margin-top: 0; padding: 12px; font-size: 14px; }
        .connection-actions .secondary { background: #444; color: #fff; }
        .connection-actions .danger { background: #ff4646; color: #fff; }
        .connection-status { margin-top: 10px; padding: 10px; border-radius: 16px; background: #1a1a1a; border: 1px solid #333; color: #aaa; display: none; font-size: 13px; }
        .connection-status.show { display: block; }
        .connection-status.error { color: #ff4646; border-color: #ff4646; }
        .connection-status.success { color: #36FF00; border-color: #36FF00; }
        .connection-btn { position: absolute; top: 8px; right: 8px; width: 32px; height: 32px; border-radius: 50%; border: none; background: transparent; color: #aaa; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; z-index: 10; }
        .back-btn { position: absolute; top: 8px; left: 8px; width: 32px; height: 32px; border-radius: 50%; border: none; background: transparent; color: #aaa; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; z-index: 10; }
        .back-btn:hover { color: #36FF00; }
        .photo-grid { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; margin-bottom: 12px; }
        .photo-thumb { width: 80px; height: 80px; object-fit: cover; border-radius: 12px; border: 1px solid #36FF00; background: #0c0c0c; }
        .add-photo-btn { background: #444; margin-top: 0; margin-bottom: 12px; }
    </style>
</head>
<body>
<div class="loading-screen" id="loadingScreen"><div style="color:#36FF00;">Загрузка...</div></div>
<div class="connection-overlay" id="connectionOverlay">
    <div class="connection-card">
        <div class="connection-title">Подключение к Google Sheets</div>
        <div class="connection-hint">Вставьте ссылку на веб-приложение Google Apps Script</div>
        <input type="text" id="appUrlInput" placeholder="https://script.google.com/macros/s/.../exec">
        <div class="connection-actions">
            <button id="testConnectionBtn" class="secondary">Проверить</button>
            <button id="saveConnectionBtn">Сохранить</button>
        </div>
        <div class="connection-actions">
            <button id="clearConnectionBtn" class="danger">Сбросить</button>
            <button id="cancelConnectionBtn" class="secondary">Отмена</button>
        </div>
        <div class="connection-status" id="connectionStatus"></div>
    </div>
</div>
<div class="app-container" id="appContainer" style="display:none;">
    <button class="back-btn" id="backBtn" style="display:none;">←</button>
    <button class="connection-btn" id="connectionBtn" style="display:flex;">⚙️</button>
    <div class="content-area">
        <div id="addressScreen" class="screen active">
            <h2 style="margin-bottom: 16px;">Выберите адрес</h2>
            <div id="addressList"></div>
            <div id="addressStatus" style="text-align:center; color:#aaa;"></div>
        </div>
        <div id="formScreen" class="screen">
            <div id="blocksContainer"></div>
            <button id="addPhotoBtn" class="add-photo-btn">📷 Добавить фото (до 10)</button>
            <div id="photoContainer" class="photo-grid"></div>
            <button id="saveAllBtn">💾 Сохранить все блоки</button>
            <div id="formStatus" class="status"></div>
        </div>
    </div>
</div>

<script>
(function(){
    const APP_URL_KEY = 'room_app_url';
    let cachedUrl = null;
    let currentAddress = null;
    let blocks = [];
    const MAX_BLOCKS = 13;
    let currentPhotoUrls = []; // до 10

    // ---- работа с URL ----
    function normalizeUrl(url) { if (!url) return ''; let u = String(url).trim().replace(/\s/g, '').split('?')[0].split('#')[0]; if (u.endsWith('/')) u = u.slice(0, -1); return u; }
    function isAppsScriptUrl(url) { return /^https:\/\/script\.google\.com\/macros\/s\/[^/]+\/exec$/i.test(normalizeUrl(url)); }
    function getAppUrl() { if (cachedUrl) return cachedUrl; const saved = localStorage.getItem(APP_URL_KEY); cachedUrl = normalizeUrl(saved) || null; return cachedUrl; }
    function saveAppUrl(url) { const n = normalizeUrl(url); localStorage.setItem(APP_URL_KEY, n); cachedUrl = n; }
    function clearAppUrl() { localStorage.removeItem(APP_URL_KEY); cachedUrl = null; }

    // DOM
    const loadingScreen = document.getElementById('loadingScreen');
    const appContainer = document.getElementById('appContainer');
    const connectionOverlay = document.getElementById('connectionOverlay');
    const connectionStatusDiv = document.getElementById('connectionStatus');
    const appUrlInput = document.getElementById('appUrlInput');
    const addressScreen = document.getElementById('addressScreen');
    const formScreen = document.getElementById('formScreen');
    const addressListDiv = document.getElementById('addressList');
    const addressStatus = document.getElementById('addressStatus');
    const blocksContainer = document.getElementById('blocksContainer');
    const saveAllBtn = document.getElementById('saveAllBtn');
    const formStatus = document.getElementById('formStatus');
    const backBtn = document.getElementById('backBtn');
    const settingsBtn = document.getElementById('connectionBtn');
    const addPhotoBtn = document.getElementById('addPhotoBtn');
    const photoContainer = document.getElementById('photoContainer');

    function showStatus(el, msg, type) {
        el.textContent = msg;
        el.className = 'status';
        if (type) el.classList.add(type);
        setTimeout(() => { if (el.classList.contains(type)) el.classList.remove(type); el.textContent = ''; el.className = 'status'; }, 3000);
    }
    function setConnectionStatus(msg, type) {
        connectionStatusDiv.textContent = msg || '';
        connectionStatusDiv.classList.remove('show', 'error', 'success');
        if (msg) { connectionStatusDiv.classList.add('show'); if (type) connectionStatusDiv.classList.add(type); }
    }
    function showConnectionOverlay(allowCancel) {
        appUrlInput.value = getAppUrl() || '';
        document.getElementById('cancelConnectionBtn').style.display = allowCancel ? 'block' : 'none';
        document.getElementById('clearConnectionBtn').style.display = getAppUrl() ? 'block' : 'none';
        setConnectionStatus('');
        connectionOverlay.classList.add('show');
    }
    function hideConnectionOverlay() { connectionOverlay.classList.remove('show'); }
    async function testConnection(url) {
        const u = normalizeUrl(url);
        if (!isAppsScriptUrl(u)) throw new Error('Неверный формат ссылки');
        const res = await fetch(`${u}?action=getAddresses`, { mode: 'cors', cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        return true;
    }

    // ---- создание блока (с поддержкой данных) ----
    function createBlock(idx, data = null) {
        const div = document.createElement('div');
        div.className = 'form-card';
        div.innerHTML = `
            <div class="block-number">📐 Помещение #${idx+1}</div>
            <button class="remove-block" ${idx === 0 ? 'disabled style="display:none;"' : ''}>✖</button>
            <div class="full-width"><label>Название комнаты</label><input type="text" class="room-name" placeholder="Гостиная" value="${escapeHtml(data?.roomName || '')}"></div>
            <div class="grid-3cols">
                <div><label>Высота (мм)</label><input type="number" class="height" placeholder="2100" value="${data?.height || ''}"></div>
                <div><label>Ширина (мм)</label><input type="number" class="width" placeholder="1200" value="${data?.width || ''}"></div>
                <div><label>Глубина (мм)</label><input type="number" class="depth" placeholder="200" value="${data?.depth || ''}"></div>
            </div>
            <div class="full-width"><label>Чистовой пол</label><input type="text" class="floor-finish" placeholder="ламинат, плитка..." value="${escapeHtml(data?.floorFinish || '')}"></div>
            <div class="double-select">
                <div><label>Сторона</label><select class="swing-side">${makeOptions(['Левое','Правое'], data?.swingSide || 'Левое')}</select></div>
                <div><label>Направление</label><select class="swing-direction">${makeOptions(['В помещение','Наружу'], data?.swingDirection || 'В помещение')}</select></div>
            </div>
            <div class="full-width"><label>Примечание</label><textarea class="comment" rows="1" placeholder="необязательно">${escapeHtml(data?.comment || '')}</textarea></div>
        `;
        const removeBtn = div.querySelector('.remove-block');
        if (removeBtn) {
            removeBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (blocks.length <= 1) return;
                const index = blocks.indexOf(div);
                if (index !== -1) {
                    blocks.splice(index, 1);
                    div.remove();
                    renumberBlocks();
                    checkAndAddNewBlock();
                }
            });
        }
        const inputs = div.querySelectorAll('input, select, textarea');
        inputs.forEach(inp => {
            inp.addEventListener('input', () => onBlockInput(div));
            inp.addEventListener('change', () => onBlockInput(div));
        });
        return div;
    }

    function makeOptions(values, selected) {
        return values.map(v => `<option value="${v}" ${v === selected ? 'selected' : ''}>${v}</option>`).join('');
    }

    function hasAnyValue(block) {
        const room = block.querySelector('.room-name').value.trim();
        const h = block.querySelector('.height').value.trim();
        const w = block.querySelector('.width').value.trim();
        const d = block.querySelector('.depth').value.trim();
        const floor = block.querySelector('.floor-finish').value.trim();
        return !!(room || h || w || d || floor);
    }

    function onBlockInput(block) {
        const lastBlock = blocks[blocks.length-1];
        if (block === lastBlock && blocks.length < MAX_BLOCKS && hasAnyValue(lastBlock)) addNewBlock();
    }

    function addNewBlock() {
        if (blocks.length >= MAX_BLOCKS) return;
        const newBlock = createBlock(blocks.length);
        blocks.push(newBlock);
        blocksContainer.appendChild(newBlock);
        renumberBlocks();
    }

    function renumberBlocks() {
        blocks.forEach((block, idx) => {
            const numDiv = block.querySelector('.block-number');
            if (numDiv) numDiv.textContent = `📐 Помещение #${idx+1}`;
            const removeBtn = block.querySelector('.remove-block');
            if (removeBtn) removeBtn.style.display = idx === 0 ? 'none' : 'block';
        });
    }

    function checkAndAddNewBlock() {
        if (blocks.length < MAX_BLOCKS && hasAnyValue(blocks[blocks.length-1])) addNewBlock();
    }

    function resetForm() {
        blocksContainer.innerHTML = '';
        blocks = [];
        blocks.push(createBlock(0));
        blocksContainer.appendChild(blocks[0]);
        renumberBlocks();
    }

    function fillBlockWithData(block, data) {
        block.querySelector('.room-name').value = data.roomName || '';
        block.querySelector('.height').value = data.height || '';
        block.querySelector('.width').value = data.width || '';
        block.querySelector('.depth').value = data.depth || '';
        block.querySelector('.floor-finish').value = data.floorFinish || '';
        block.querySelector('.swing-side').value = data.swingSide || 'Левое';
        block.querySelector('.swing-direction').value = data.swingDirection || 'В помещение';
        block.querySelector('.comment').value = data.comment || '';
    }

    async function loadBlocksFromServer(address) {
        const url = getAppUrl();
        if (!url) return [];
        try {
            const res = await fetch(`${url}?action=getRecordsByAddress&address=${encodeURIComponent(address)}`, { mode: 'cors' });
            const data = await res.json();
            if (data.error) return [];
            return Array.isArray(data) ? data : [];
        } catch(e) { return []; }
    }

    async function loadPhotosForAddress(address) {
        const url = getAppUrl();
        if (!url) return [];
        try {
            const res = await fetch(`${url}?action=getPhotos&address=${encodeURIComponent(address)}`, { mode: 'cors' });
            const data = await res.json();
            if (data.urls) return data.urls;
        } catch(e) {}
        return [];
    }

    function renderPhotos(urls) {
        photoContainer.innerHTML = '';
        currentPhotoUrls = urls.filter(u => u);
        currentPhotoUrls.forEach(url => {
            const img = document.createElement('img');
            img.src = url;
            img.className = 'photo-thumb';
            photoContainer.appendChild(img);
        });
    }

    // ---- сохранение блоков ----
    function collectAllBlocks() {
        const result = [];
        for (let i=0; i<blocks.length; i++) {
            const b = blocks[i];
            const room = b.querySelector('.room-name').value.trim();
            const h = b.querySelector('.height').value.trim();
            const w = b.querySelector('.width').value.trim();
            const d = b.querySelector('.depth').value.trim();
            const floor = b.querySelector('.floor-finish').value.trim();
            if (!room && !h && !w && !d && !floor) continue;
            result.push({
                address: currentAddress,
                blockNumber: i+1,
                roomName: room,
                height: parseFloat(h||0),
                width: parseFloat(w||0),
                depth: parseFloat(d||0),
                floorFinish: floor,
                swingSide: b.querySelector('.swing-side').value,
                swingDirection: b.querySelector('.swing-direction').value,
                comment: b.querySelector('.comment').value.trim()
            });
        }
        return result.filter(b => b.roomName && b.height && b.width && b.depth && b.floorFinish);
    }

    async function saveAllBlocks() {
        const data = collectAllBlocks();
        if (data.length === 0) {
            showStatus(formStatus, 'Нет заполненных блоков', 'error');
            return;
        }
        saveAllBtn.disabled = true;
        showStatus(formStatus, 'Сохранение...', '');
        try {
            const url = getAppUrl();
            const res = await fetch(url, {
                method: 'POST',
                mode: 'cors',
                body: JSON.stringify({ blocks: data })
            });
            const response = await res.json();
            if (!res.ok || response.error) throw new Error(response.error || 'Ошибка');
            showStatus(formStatus, `✅ Сохранено ${data.length} помещений`, 'success');
            setTimeout(() => {
                addressScreen.classList.add('active');
                formScreen.classList.remove('active');
                resetForm();
                loadAddresses();
                backBtn.style.display = 'none';
                settingsBtn.style.display = 'flex';
            }, 1500);
        } catch(err) {
            showStatus(formStatus, 'Ошибка: ' + err.message, 'error');
        } finally {
            saveAllBtn.disabled = false;
        }
    }

    // ---- загрузка адресов ----
    async function loadAddresses() {
        const url = getAppUrl();
        if (!url) return;
        addressListDiv.innerHTML = '';
        addressStatus.textContent = 'Загрузка адресов...';
        try {
            const res = await fetch(`${url}?action=getAddresses`, { mode: 'cors', cache: 'no-store' });
            const data = await res.json();
            if (data.error) throw new Error(data.error);
            const addresses = data;
            if (!addresses.length) { addressStatus.textContent = 'Нет адресов'; return; }
            addressStatus.textContent = '';
            addresses.forEach(addr => {
                const div = document.createElement('div');
                div.className = 'address-item';
                div.innerHTML = `<div class="address-title">${escapeHtml(addr)}</div><span class="edit-icon">✏️</span>`;
                div.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    currentAddress = addr;
                    addressStatus.textContent = `Загрузка...`;
                    const savedBlocks = await loadBlocksFromServer(addr);
                    const photoUrls = await loadPhotosForAddress(addr);
                    addressStatus.textContent = '';
                    resetForm();
                    if (savedBlocks && savedBlocks.length) {
                        fillBlockWithData(blocks[0], savedBlocks[0]);
                        for (let i=1; i<savedBlocks.length; i++) {
                            const newBlock = createBlock(blocks.length, savedBlocks[i]);
                            blocks.push(newBlock);
                            blocksContainer.appendChild(newBlock);
                        }
                        renumberBlocks();
                        if (blocks.length < MAX_BLOCKS && hasAnyValue(blocks[blocks.length-1])) addNewBlock();
                    }
                    renderPhotos(photoUrls);
                    addressScreen.classList.remove('active');
                    formScreen.classList.add('active');
                    settingsBtn.style.display = 'none';
                    backBtn.style.display = 'flex';
                });
                addressListDiv.appendChild(div);
            });
        } catch(err) {
            addressStatus.textContent = 'Ошибка загрузки: ' + err.message;
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
    }

    // ---- фото: добавление ----
    async function uploadPhoto(photoIndex, base64, fileName) {
        const url = getAppUrl();
        if (!url) throw new Error('No app url');
        const res = await fetch(`${url}?action=uploadPhoto`, {
            method: 'POST',
            mode: 'cors',
            body: JSON.stringify({
                action: 'uploadPhoto',
                address: currentAddress,
                photoIndex: photoIndex,
                base64: base64,
                fileName: fileName
            })
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        return data.url;
    }

    addPhotoBtn.addEventListener('click', () => {
        if (!currentAddress) return;
        if (currentPhotoUrls.length >= 10) {
            alert('Максимум 10 фото для адреса');
            return;
        }
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.multiple = false; // по одному для простоты
        input.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (ev) => {
                const base64 = ev.target.result;
                const nextIndex = currentPhotoUrls.length + 1;
                try {
                    const newUrl = await uploadPhoto(nextIndex, base64, file.name);
                    currentPhotoUrls.push(newUrl);
                    renderPhotos(currentPhotoUrls);
                    showStatus(formStatus, 'Фото добавлено', 'success');
                } catch(err) {
                    showStatus(formStatus, 'Ошибка загрузки фото', 'error');
                }
            };
            reader.readAsDataURL(file);
        };
        input.click();
    });

    function goBackToAddresses() {
        addressScreen.classList.add('active');
        formScreen.classList.remove('active');
        resetForm();
        loadAddresses();
        backBtn.style.display = 'none';
        settingsBtn.style.display = 'flex';
        renderPhotos([]);
        currentPhotoUrls = [];
    }

    // ---- инициализация ----
    async function initApp() {
        const url = getAppUrl();
        if (!url) {
            loadingScreen.classList.add('hidden');
            appContainer.style.display = 'none';
            showConnectionOverlay(false);
            return;
        }
        try {
            await testConnection(url);
            loadingScreen.classList.add('hidden');
            appContainer.style.display = 'flex';
            addressScreen.classList.add('active');
            formScreen.classList.remove('active');
            backBtn.style.display = 'none';
            settingsBtn.style.display = 'flex';
            await loadAddresses();
        } catch(e) {
            loadingScreen.classList.add('hidden');
            appContainer.style.display = 'none';
            showConnectionOverlay(false);
            setConnectionStatus('Ошибка: ' + e.message, 'error');
        }
    }

    document.getElementById('connectionBtn').addEventListener('click', () => showConnectionOverlay(true));
    document.getElementById('cancelConnectionBtn').addEventListener('click', hideConnectionOverlay);
    document.getElementById('clearConnectionBtn').addEventListener('click', () => { clearAppUrl(); appContainer.style.display = 'none'; showConnectionOverlay(false); setConnectionStatus('Сброшено','success'); });
    document.getElementById('testConnectionBtn').addEventListener('click', async () => {
        const u = appUrlInput.value;
        setConnectionStatus('Проверка...');
        try { await testConnection(u); setConnectionStatus('Успешно','success'); } catch(err) { setConnectionStatus(err.message,'error'); }
    });
    document.getElementById('saveConnectionBtn').addEventListener('click', async () => {
        const u = appUrlInput.value;
        setConnectionStatus('Проверка...');
        try { await testConnection(u); saveAppUrl(u); hideConnectionOverlay(); await initApp(); } catch(err) { setConnectionStatus(err.message,'error'); }
    });
    saveAllBtn.addEventListener('click', saveAllBlocks);
    backBtn.addEventListener('click', goBackToAddresses);
    initApp();
})();
</script>
</body>
</html>
