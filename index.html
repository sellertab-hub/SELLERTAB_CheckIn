<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Замеры помещений</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #000; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 8px; }
        .loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; z-index: 1000; transition: opacity .3s; }
        .loading-screen.hidden { opacity: 0; pointer-events: none; }
        .app-container { width: 100%; max-width: 500px; height: 90vh; background: #0c0c0c; border-radius: 28px; border: 1px solid #222; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .content-area { flex: 1; overflow-y: auto; padding: 16px; padding-top: 52px; } /* отступ для кнопки назад */
        .screen { display: none; }
        .screen.active { display: block; }
        button { width: 100%; padding: 14px; background: #36FF00; border: none; border-radius: 60px; font-size: 18px; font-weight: 600; color: #000; cursor: pointer; transition: .2s; margin-top: 12px; }
        button:disabled { background: #2a2a2a; color: #666; cursor: not-allowed; }
        /* Карточки клиентов на главном экране */
        .client-card { background: #1a1a1a; border-radius: 20px; padding: 14px; margin-bottom: 12px; border: 1px solid #333; cursor: pointer; transition: .2s; position: relative; }
        .client-card:hover { border-color: #36FF00; background: #222; }
        .client-stage { position: absolute; top: 8px; left: 12px; font-size: 10px; color: #36FF00; background: rgba(54,255,0,0.2); padding: 2px 8px; border-radius: 20px; }
        .client-address-row { display: flex; justify-content: space-between; align-items: flex-start; margin-top: 20px; margin-bottom: 8px; gap: 8px; }
        .client-address { font-size: 16px; font-weight: 600; word-break: break-word; flex: 1; }
        .map-link { background: #2a2a2a; border: none; border-radius: 30px; padding: 6px 12px; font-size: 12px; color: #aaa; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; }
        .map-link:hover { background: #36FF00; color: #000; }
        .client-info { font-size: 14px; color: #ddd; margin-bottom: 6px; display: flex; flex-wrap: wrap; gap: 12px; }
        .client-phone { color: #36FF00; text-decoration: none; }
        .client-datetime { color: #aaa; font-size: 12px; margin-bottom: 6px; }
        .client-comment { font-size: 12px; color: #aaa; border-top: 1px solid #333; margin-top: 6px; padding-top: 6px; }
        /* Мини-карточка на экране формы */
        .mini-client-card { background: #1a1a1a; border-radius: 16px; padding: 10px; margin-bottom: 16px; border-left: 3px solid #36FF00; }
        .mini-client-card .client-address-row { margin-top: 0; }
        .mini-client-card .client-info { font-size: 12px; }
        /* Форма блоков */
        .form-card { background: #1a1a1a; border-radius: 20px; padding: 12px; margin-bottom: 16px; border: 1px solid #333; position: relative; }
        .form-card .block-number { font-size: 12px; color: #36FF00; margin-bottom: 10px; font-weight: 600; }
        .grid-3cols { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .grid-2cols { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .full-width { margin-bottom: 10px; }
        label { display: block; font-size: 11px; color: #aaa; margin-bottom: 4px; }
        input, select, textarea { width: 100%; padding: 10px 10px; background: #0c0c0c; border: 1px solid #333; border-radius: 14px; font-size: 14px; color: #fff; outline: none; font-family: inherit; }
        input:focus, select:focus, textarea:focus { border-color: #36FF00; }
        textarea { resize: vertical; min-height: 60px; }
        .correction-divider { margin-top: 8px; margin-bottom: 8px; border-top: 1px dashed #333; }
        .remove-block { position: absolute; top: 8px; right: 12px; background: #ff4646; border: none; border-radius: 20px; padding: 4px 10px; font-size: 12px; font-weight: bold; color: #fff; cursor: pointer; width: auto; margin: 0; }
        .remove-block:hover { background: #ff6666; }
        .status { margin-top: 12px; padding: 10px; border-radius: 60px; text-align: center; display: none; background: #1a1a1a; border: 1px solid #333; }
        .status.success { display: block; background: rgba(54,255,0,.15); color: #36FF00; border-color: #36FF00; }
        .status.error { display: block; background: rgba(255,70,70,.15); color: #ff4646; border-color: #ff4646; }
        /* Оверлей подключения */
        .connection-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.92); display: none; align-items: center; justify-content: center; padding: 16px; z-index: 2000; }
        .connection-overlay.show { display: flex; }
        .connection-card { width: 100%; max-width: 420px; background: #0c0c0c; border: 1px solid #222; border-radius: 24px; padding: 16px; }
        .connection-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
        .connection-hint { color: #aaa; font-size: 13px; margin-bottom: 12px; }
        .connection-actions { display: flex; gap: 8px; margin-top: 8px; }
        .connection-actions button { margin-top: 0; padding: 12px; font-size: 14px; }
        .connection-actions .secondary { background: #444; color: #fff; }
        .connection-actions .danger { background: #ff4646; color: #fff; }
        .connection-status { margin-top: 10px; padding: 10px; border-radius: 16px; background: #1a1a1a; border: 1px solid #333; color: #aaa; display: none; font-size: 13px; }
        .connection-status.show { display: block; }
        .connection-status.error { color: #ff4646; border-color: #ff4646; }
        .connection-status.success { color: #36FF00; border-color: #36FF00; }
        .connection-btn { position: absolute; top: 8px; right: 8px; width: 32px; height: 32px; border-radius: 50%; border: none; background: transparent; color: #aaa; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; z-index: 10; }
        .back-btn { position: absolute; top: 8px; left: 8px; width: 32px; height: 32px; border-radius: 50%; border: none; background: transparent; color: #aaa; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; z-index: 10; }
        .back-btn:hover { color: #36FF00; }
        /* Дополнительно для мини-карточки */
        .mini-client-card .client-phone { font-size: 12px; }
    </style>
</head>
<body>
<div class="loading-screen" id="loadingScreen"><div style="color:#36FF00;">Загрузка...</div></div>
<div class="connection-overlay" id="connectionOverlay">
    <div class="connection-card">
        <div class="connection-title">Подключение к Google Sheets</div>
        <div class="connection-hint">Вставьте ссылку на веб-приложение Google Apps Script (формат <code>https://script.google.com/macros/s/.../exec</code>)</div>
        <input type="text" id="appUrlInput" placeholder="Вставьте ссылку">
        <div class="connection-actions">
            <button id="testConnectionBtn" class="secondary">Проверить</button>
            <button id="saveConnectionBtn">Сохранить</button>
        </div>
        <div class="connection-actions" style="margin-top:8px;">
            <button id="clearConnectionBtn" class="danger">Сбросить</button>
            <button id="cancelConnectionBtn" class="secondary">Отмена</button>
        </div>
        <div class="connection-status" id="connectionStatus"></div>
    </div>
</div>
<div class="app-container" id="appContainer" style="display:none;">
    <button class="back-btn" id="backBtn" style="display:none;">←</button>
    <button class="connection-btn" id="connectionBtn" style="display:flex;">⚙️</button>
    <div class="content-area">
        <div id="addressScreen" class="screen active">
            <h2 style="margin-bottom: 16px;">Заявки на замер</h2>
            <div id="addressList"></div>
            <div id="addressStatus" style="text-align:center; color:#aaa;"></div>
        </div>
        <div id="formScreen" class="screen">
            <div id="miniClientCard" class="mini-client-card" style="display:none;"></div>
            <div id="blocksContainer"></div>
            <button id="saveAllBtn">💾 Сохранить все блоки</button>
            <div id="formStatus" class="status"></div>
        </div>
    </div>
</div>

<script>
(function(){
    const APP_URL_KEY = 'room_app_url';
    let cachedUrl = null;
    let currentAddress = null;
    let blocks = [];
    const MAX_BLOCKS = 13;
    let cachedFullData = null; // глобальный кэш всех данных

    function normalizeUrl(url) { if (!url) return ''; let u = String(url).trim().replace(/\s/g, '').split('?')[0].split('#')[0]; if (u.endsWith('/')) u = u.slice(0, -1); return u; }
    function isAppsScriptUrl(url) { return /^https:\/\/script\.google\.com\/macros\/s\/[^/]+\/exec$/i.test(normalizeUrl(url)); }
    function getAppUrl() { if (cachedUrl) return cachedUrl; const saved = localStorage.getItem(APP_URL_KEY); cachedUrl = normalizeUrl(saved) || null; return cachedUrl; }
    function saveAppUrl(url) { const n = normalizeUrl(url); localStorage.setItem(APP_URL_KEY, n); cachedUrl = n; }
    function clearAppUrl() { localStorage.removeItem(APP_URL_KEY); cachedUrl = null; }

    const loadingScreen = document.getElementById('loadingScreen');
    const appContainer = document.getElementById('appContainer');
    const connectionOverlay = document.getElementById('connectionOverlay');
    const connectionStatusDiv = document.getElementById('connectionStatus');
    const appUrlInput = document.getElementById('appUrlInput');
    const addressScreen = document.getElementById('addressScreen');
    const formScreen = document.getElementById('formScreen');
    const addressListDiv = document.getElementById('addressList');
    const addressStatus = document.getElementById('addressStatus');
    const blocksContainer = document.getElementById('blocksContainer');
    const saveAllBtn = document.getElementById('saveAllBtn');
    const formStatus = document.getElementById('formStatus');
    const backBtn = document.getElementById('backBtn');
    const settingsBtn = document.getElementById('connectionBtn');
    const miniClientCard = document.getElementById('miniClientCard');

    function showStatus(el, msg, type) {
        el.textContent = msg;
        el.className = 'status';
        if (type) el.classList.add(type);
        setTimeout(() => { if (el.classList.contains(type)) el.classList.remove(type); el.textContent = ''; el.className = 'status'; }, 3000);
    }
    function setConnectionStatus(msg, type) {
        connectionStatusDiv.textContent = msg || '';
        connectionStatusDiv.classList.remove('show', 'error', 'success');
        if (msg) { connectionStatusDiv.classList.add('show'); if (type) connectionStatusDiv.classList.add(type); }
    }
    function showConnectionOverlay(allowCancel) {
        appUrlInput.value = getAppUrl() || '';
        document.getElementById('cancelConnectionBtn').style.display = allowCancel ? 'block' : 'none';
        document.getElementById('clearConnectionBtn').style.display = getAppUrl() ? 'block' : 'none';
        setConnectionStatus('');
        connectionOverlay.classList.add('show');
    }
    function hideConnectionOverlay() { connectionOverlay.classList.remove('show'); }
    async function testConnection(url) {
        const u = normalizeUrl(url);
        if (!isAppsScriptUrl(u)) throw new Error('Ссылка должна быть https://script.google.com/macros/s/.../exec');
        const res = await fetch(`${u}?action=getAllData`, { mode: 'cors', cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        return true;
    }

    // Функция форматирования даты
    function formatDateTime(dateStr) {
        if (!dateStr) return '';
        const date = new Date(dateStr);
        if (isNaN(date.getTime())) return dateStr;
        const days = ['Воскресенье', 'Понедельник', 'Вторник', 'Среда', 'Четверг', 'Пятница', 'Суббота'];
        const months = ['января', 'февраля', 'марта', 'апреля', 'мая', 'июня', 'июля', 'августа', 'сентября', 'октября', 'ноября', 'декабря'];
        const dayName = days[date.getDay()];
        const dayNum = date.getDate();
        const monthName = months[date.getMonth()];
        let hours = date.getHours();
        const minutes = date.getMinutes().toString().padStart(2, '0');
        return `${dayName}, ${dayNum} ${monthName} в ${hours}:${minutes}`;
    }

    function makeDoorOptions(selected) {
        const options = ['Лев IN', 'Лев AUT', 'Пр IN', 'Пр AUT', 'Раздвижная в лево', 'Раздвижная в право', 'Портал'];
        return options.map(v => `<option value="${v}" ${v === selected ? 'selected' : ''}>${v}</option>`).join('');
    }

    function createBlock(idx, data = null) {
        const div = document.createElement('div');
        div.className = 'form-card';
        div.dataset.index = idx;
        div.innerHTML = `
            <div class="block-number">📐 Помещение #${idx+1}</div>
            <button class="remove-block" ${idx === 0 ? 'disabled style="display:none;"' : ''}>✖</button>
            <div class="full-width"><label>Название комнаты</label><input type="text" class="room-name" placeholder="Гостиная" value="${escapeHtml(data?.roomName || '')}"></div>
            <div class="grid-3cols">
                <div><input type="number" class="height" placeholder="Высота проема" value="${data?.height || ''}"></div>
                <div><input type="number" class="width" placeholder="Ширина проема" value="${data?.width || ''}"></div>
                <div><input type="number" class="wall-thickness" placeholder="Толщина стены" value="${data?.wallThickness || ''}"></div>
            </div>
            <div class="correction-divider"></div>
            <div class="grid-3cols">
                <div><input type="number" class="corr-height" placeholder="Коррекция высоты" value="${data?.corrHeight || ''}"></div>
                <div><input type="number" class="corr-width" placeholder="Коррекция ширины" value="${data?.corrWidth || ''}"></div>
                <div><input type="number" class="corr-wall" placeholder="Коррекция толщины" value="${data?.corrWallThickness || ''}"></div>
            </div>
            <div class="grid-2cols">
                <div><label>Поднятие чистового пола (мм)</label><input type="number" class="floor-raise" placeholder="0" value="${data?.floorRaise || ''}"></div>
                <div><label>Тип открывания</label><select class="door-type">${makeDoorOptions(data?.doorType || 'Лев IN')}</select></div>
            </div>
            <div class="full-width"><label>Примечание</label><textarea class="comment" rows="1" placeholder="необязательно">${escapeHtml(data?.comment || '')}</textarea></div>
        `;
        const removeBtn = div.querySelector('.remove-block');
        if (removeBtn) {
            removeBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (blocks.length <= 1) return;
                const index = blocks.indexOf(div);
                if (index !== -1) {
                    blocks.splice(index, 1);
                    div.remove();
                    renumberBlocks();
                    checkAndAddNewBlock();
                }
            });
        }
        const inputs = div.querySelectorAll('input, select, textarea');
        inputs.forEach(input => {
            input.addEventListener('input', () => onBlockInput(div));
            input.addEventListener('change', () => onBlockInput(div));
        });
        return div;
    }

    function hasAnyValue(block) {
        const room = block.querySelector('.room-name').value.trim();
        const h = block.querySelector('.height').value.trim();
        const w = block.querySelector('.width').value.trim();
        const wall = block.querySelector('.wall-thickness').value.trim();
        const floor = block.querySelector('.floor-raise').value.trim();
        return !!(room || h || w || wall || floor);
    }

    function onBlockInput(block) {
        const lastBlock = blocks[blocks.length-1];
        if (block === lastBlock && blocks.length < MAX_BLOCKS && hasAnyValue(lastBlock)) {
            addNewBlock();
        }
    }

    function addNewBlock() {
        if (blocks.length >= MAX_BLOCKS) return;
        const newBlock = createBlock(blocks.length);
        blocks.push(newBlock);
        blocksContainer.appendChild(newBlock);
        renumberBlocks();
    }

    function renumberBlocks() {
        blocks.forEach((block, idx) => {
            block.dataset.index = idx;
            const numDiv = block.querySelector('.block-number');
            if (numDiv) numDiv.textContent = `📐 Помещение #${idx+1}`;
            const removeBtn = block.querySelector('.remove-block');
            if (removeBtn) removeBtn.style.display = idx === 0 ? 'none' : 'block';
        });
    }

    function checkAndAddNewBlock() {
        if (blocks.length < MAX_BLOCKS && hasAnyValue(blocks[blocks.length-1])) {
            addNewBlock();
        }
    }

    function resetForm() {
        blocksContainer.innerHTML = '';
        blocks = [];
        const firstBlock = createBlock(0);
        blocks.push(firstBlock);
        blocksContainer.appendChild(firstBlock);
        renumberBlocks();
    }

    function fillBlockWithData(block, data) {
        block.querySelector('.room-name').value = data.roomName || '';
        block.querySelector('.height').value = data.height || '';
        block.querySelector('.width').value = data.width || '';
        block.querySelector('.wall-thickness').value = data.wallThickness || '';
        block.querySelector('.floor-raise').value = data.floorRaise || '';
        block.querySelector('.door-type').value = data.doorType || 'Лев IN';
        block.querySelector('.corr-height').value = data.corrHeight || '';
        block.querySelector('.corr-width').value = data.corrWidth || '';
        block.querySelector('.corr-wall').value = data.corrWallThickness || '';
        block.querySelector('.comment').value = data.comment || '';
    }

    function collectAllBlocks() {
        const result = [];
        for (let i = 0; i < blocks.length; i++) {
            const b = blocks[i];
            const roomName = b.querySelector('.room-name').value.trim();
            const height = b.querySelector('.height').value.trim();
            const width = b.querySelector('.width').value.trim();
            const wallThickness = b.querySelector('.wall-thickness').value.trim();
            const floorRaise = b.querySelector('.floor-raise').value.trim();
            if (!roomName || !height || !width || !wallThickness || floorRaise === '') continue;
            result.push({
                address: currentAddress,
                blockNumber: i+1,
                roomName: roomName,
                height: parseFloat(height),
                width: parseFloat(width),
                wallThickness: parseFloat(wallThickness),
                floorRaise: parseFloat(floorRaise),
                doorType: b.querySelector('.door-type').value,
                corrHeight: parseFloat(b.querySelector('.corr-height').value) || 0,
                corrWidth: parseFloat(b.querySelector('.corr-width').value) || 0,
                corrWallThickness: parseFloat(b.querySelector('.corr-wall').value) || 0,
                comment: b.querySelector('.comment').value.trim()
            });
        }
        return result;
    }

    async function saveAllBlocks() {
        const data = collectAllBlocks();
        if (data.length === 0) {
            showStatus(formStatus, 'Нет заполненных блоков. Заполните хотя бы один.', 'error');
            return;
        }
        saveAllBtn.disabled = true;
        showStatus(formStatus, 'Сохранение...', '');
        try {
            const url = getAppUrl();
            const res = await fetch(url, {
                method: 'POST',
                mode: 'cors',
                body: JSON.stringify({ blocks: data })
            });
            const response = await res.json();
            if (!res.ok || response.error) throw new Error(response.error || 'Ошибка сервера');
            showStatus(formStatus, `✅ Сохранено ${data.length} помещений!`, 'success');
            // Обновляем кэш после сохранения
            await loadFullData(true);
            setTimeout(() => {
                addressScreen.classList.add('active');
                formScreen.classList.remove('active');
                resetForm();
                loadAddresses();
                backBtn.style.display = 'none';
                settingsBtn.style.display = 'flex';
                miniClientCard.style.display = 'none';
                miniClientCard.innerHTML = '';
            }, 1500);
        } catch (err) {
            showStatus(formStatus, 'Ошибка: ' + err.message, 'error');
        } finally {
            saveAllBtn.disabled = false;
        }
    }

    // Функция загрузки всех данных одним запросом
    async function loadFullData(force = false) {
        if (!force && cachedFullData) return cachedFullData;
        const url = getAppUrl();
        if (!url) return null;
        try {
            const res = await fetch(`${url}?action=getAllData`, { mode: 'cors', cache: 'no-store' });
            const data = await res.json();
            if (data.error) throw new Error(data.error);
            cachedFullData = data;
            return data;
        } catch (err) {
            console.error('loadFullData error:', err);
            return null;
        }
    }

    async function loadAddresses() {
        const data = await loadFullData();
        if (!data) return;
        const clients = data.clients || [];
        addressListDiv.innerHTML = '';
        if (!clients.length) {
            addressStatus.textContent = 'Нет заявок в таблице orders';
            return;
        }
        addressStatus.textContent = '';
        clients.forEach(client => {
            const card = document.createElement('div');
            card.className = 'client-card';
            if (client.stage) {
                const stageSpan = document.createElement('div');
                stageSpan.className = 'client-stage';
                stageSpan.textContent = client.stage;
                card.appendChild(stageSpan);
            }
            const addressRow = document.createElement('div');
            addressRow.className = 'client-address-row';
            const addressSpan = document.createElement('div');
            addressSpan.className = 'client-address';
            addressSpan.textContent = client.address;
            const mapLink = document.createElement('a');
            mapLink.className = 'map-link';
            mapLink.href = `https://yandex.ru/maps/?text=${encodeURIComponent(client.address)}`;
            mapLink.target = '_blank';
            mapLink.innerHTML = '🗺️ Карта';
            mapLink.onclick = (e) => e.stopPropagation();
            addressRow.appendChild(addressSpan);
            addressRow.appendChild(mapLink);
            card.appendChild(addressRow);
            
            const infoDiv = document.createElement('div');
            infoDiv.className = 'client-info';
            if (client.name) {
                const nameSpan = document.createElement('span');
                nameSpan.textContent = client.name;
                infoDiv.appendChild(nameSpan);
            }
            if (client.phone) {
                const phoneLink = document.createElement('a');
                phoneLink.className = 'client-phone';
                phoneLink.href = `tel:${client.phone.replace(/[^0-9+]/g, '')}`;
                phoneLink.textContent = client.phone;
                // Предотвращаем переход в форму при клике на телефон
                phoneLink.onclick = (e) => e.stopPropagation();
                infoDiv.appendChild(phoneLink);
            }
            if (infoDiv.children.length) card.appendChild(infoDiv);
            
            if (client.dateTimeString) {
                const dateDiv = document.createElement('div');
                dateDiv.className = 'client-datetime';
                const formatted = formatDateTime(client.dateTimeString);
                dateDiv.textContent = `📅 Замер: ${formatted}`;
                card.appendChild(dateDiv);
            }
            if (client.comment) {
                const commentDiv = document.createElement('div');
                commentDiv.className = 'client-comment';
                commentDiv.textContent = `💬 ${client.comment}`;
                card.appendChild(commentDiv);
            }
            card.addEventListener('click', async (e) => {
                if (e.target.closest('.map-link') || e.target.closest('.client-phone')) return;
                e.stopPropagation();
                currentAddress = client.address;
                const savedBlocks = (cachedFullData.records && cachedFullData.records[currentAddress]) ? cachedFullData.records[currentAddress] : [];
                const photos = (cachedFullData.photos && cachedFullData.photos[currentAddress]) ? cachedFullData.photos[currentAddress] : [];
                resetForm();
                if (savedBlocks && savedBlocks.length) {
                    fillBlockWithData(blocks[0], savedBlocks[0]);
                    for (let i = 1; i < savedBlocks.length; i++) {
                        const newBlock = createBlock(blocks.length, savedBlocks[i]);
                        blocks.push(newBlock);
                        blocksContainer.appendChild(newBlock);
                    }
                    renumberBlocks();
                    if (blocks.length < MAX_BLOCKS && hasAnyValue(blocks[blocks.length-1])) addNewBlock();
                }
                // Отображаем мини-карточку клиента
                renderMiniClientCard(client);
                addressScreen.classList.remove('active');
                formScreen.classList.add('active');
                settingsBtn.style.display = 'none';
                backBtn.style.display = 'flex';
            });
            addressListDiv.appendChild(card);
        });
    }

    function renderMiniClientCard(client) {
        miniClientCard.style.display = 'block';
        miniClientCard.innerHTML = `
            <div class="client-address-row">
                <div class="client-address">${escapeHtml(client.address)}</div>
                <a class="map-link" href="https://yandex.ru/maps/?text=${encodeURIComponent(client.address)}" target="_blank" onclick="event.stopPropagation()">🗺️ Карта</a>
            </div>
            <div class="client-info">
                <span>${escapeHtml(client.name || '')}</span>
                <a class="client-phone" href="tel:${(client.phone || '').replace(/[^0-9+]/g, '')}" onclick="event.stopPropagation()">${escapeHtml(client.phone || '')}</a>
            </div>
            ${client.dateTimeString ? `<div class="client-datetime">📅 Замер: ${formatDateTime(client.dateTimeString)}</div>` : ''}
            ${client.comment ? `<div class="client-comment">💬 ${escapeHtml(client.comment)}</div>` : ''}
        `;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
    }

    function goBackToAddresses() {
        addressScreen.classList.add('active');
        formScreen.classList.remove('active');
        resetForm();
        loadAddresses();
        backBtn.style.display = 'none';
        settingsBtn.style.display = 'flex';
        miniClientCard.style.display = 'none';
        miniClientCard.innerHTML = '';
    }

    async function initApp() {
        const url = getAppUrl();
        if (!url) {
            loadingScreen.classList.add('hidden');
            appContainer.style.display = 'none';
            showConnectionOverlay(false);
            return;
        }
        try {
            await testConnection(url);
            // Предзагружаем данные
            await loadFullData(true);
            loadingScreen.classList.add('hidden');
            appContainer.style.display = 'flex';
            addressScreen.classList.add('active');
            formScreen.classList.remove('active');
            backBtn.style.display = 'none';
            settingsBtn.style.display = 'flex';
            await loadAddresses();
        } catch (e) {
            loadingScreen.classList.add('hidden');
            appContainer.style.display = 'none';
            showConnectionOverlay(false);
            setConnectionStatus('Ошибка подключения: ' + e.message, 'error');
        }
    }

    document.getElementById('connectionBtn').addEventListener('click', () => showConnectionOverlay(true));
    document.getElementById('cancelConnectionBtn').addEventListener('click', hideConnectionOverlay);
    document.getElementById('clearConnectionBtn').addEventListener('click', () => { clearAppUrl(); appContainer.style.display = 'none'; showConnectionOverlay(false); setConnectionStatus('Сброшено', 'success'); });
    document.getElementById('testConnectionBtn').addEventListener('click', async () => {
        const u = appUrlInput.value;
        setConnectionStatus('Проверка...');
        try { await testConnection(u); setConnectionStatus('Успешно', 'success'); } catch (err) { setConnectionStatus(err.message, 'error'); }
    });
    document.getElementById('saveConnectionBtn').addEventListener('click', async () => {
        const u = appUrlInput.value;
        setConnectionStatus('Проверка...');
        try { await testConnection(u); saveAppUrl(u); hideConnectionOverlay(); await initApp(); } catch (err) { setConnectionStatus(err.message, 'error'); }
    });
    saveAllBtn.addEventListener('click', saveAllBlocks);
    backBtn.addEventListener('click', goBackToAddresses);
    initApp();
})();
</script>
</body>
</html>
