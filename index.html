<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Замеры</title>
<style>body{font-family:sans-serif;background:#000;color:#fff;padding:16px}.card{background:#1a1a1a;border-radius:20px;padding:12px;margin-bottom:12px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}input,select,textarea{width:100%;padding:8px;border-radius:12px;border:1px solid #333;background:#0c0c0c;color:#fff}button{background:#36FF00;border:none;border-radius:60px;padding:12px;width:100%;font-weight:bold;margin-top:12px}.error{color:#ff4646}.success{color:#36FF00}</style>
</head>
<body>
<div id="connectPanel"><input type="text" id="urlInput" placeholder="Ссылка на Apps Script" style="width:100%"><button id="saveUrl">Сохранить</button><div id="connMsg"></div></div>
<div id="app" style="display:none">
    <div id="addressPanel"><h2>Выберите адрес</h2><div id="addressList"></div></div>
    <div id="formPanel" style="display:none"><div id="blocks"></div><button id="saveAll">Сохранить все блоки</button><div id="status"></div></div>
</div>
<script>
const STORAGE_KEY = 'room_app_url';
let currentUrl, currentAddress, blocks = [];

function getUrl(){ return localStorage.getItem(STORAGE_KEY); }
function setUrl(u){ localStorage.setItem(STORAGE_KEY, u); currentUrl = u; }
function clearUrl(){ localStorage.removeItem(STORAGE_KEY); currentUrl = null; }

async function testAndInit(){
    const url = getUrl();
    if(!url){ document.getElementById('connectPanel').style.display='block'; return; }
    if(!url.match(/^https:\/\/script\.google\.com\/macros\/s\/[^/]+\/exec$/)){ showMsg('connMsg','Неверный формат ссылки','error'); return; }
    currentUrl = url;
    try{
        const res = await fetch(url+'?action=getAddresses');
        if(!res.ok) throw new Error('HTTP '+res.status);
        const data = await res.json();
        if(data.error) throw new Error(data.error);
        document.getElementById('connectPanel').style.display='none';
        document.getElementById('app').style.display='block';
        document.getElementById('addressPanel').style.display='block';
        document.getElementById('formPanel').style.display='none';
        renderAddresses(data);
    }catch(e){
        showMsg('connMsg',e.message,'error');
        document.getElementById('connectPanel').style.display='block';
    }
}

function renderAddresses(addrs){
    const container = document.getElementById('addressList');
    container.innerHTML = '';
    if(!addrs.length){ container.innerHTML='<div class="error">Нет адресов в orders</div>'; return; }
    addrs.forEach(addr=>{
        const div = document.createElement('div');
        div.className='card';
        div.textContent=addr;
        div.onclick=()=>{
            currentAddress=addr;
            document.getElementById('addressPanel').style.display='none';
            document.getElementById('formPanel').style.display='block';
            initBlocks();
        };
        container.appendChild(div);
    });
}

function initBlocks(){
    blocks = [];
    document.getElementById('blocks').innerHTML = '';
    addBlock(0);
}

function addBlock(index){
    const div = document.createElement('div');
    div.className='card';
    div.innerHTML = `
        <div style="display:flex; justify-content:space-between;"><b>Помещение #${index+1}</b>${index===0?'':`<button class="delBlock" style="background:#ff4646; padding:4px 8px; width:auto;">×</button>`}</div>
        <input type="text" class="roomName" placeholder="Название комнаты">
        <div class="grid3">
            <input type="number" class="height" placeholder="Высота">
            <input type="number" class="width" placeholder="Ширина">
            <input type="number" class="depth" placeholder="Глубина">
        </div>
        <input type="text" class="floor" placeholder="Чистовой пол">
        <div class="grid">
            <select class="side"><option>Левое</option><option>Правое</option></select>
            <select class="dir"><option>В помещение</option><option>Наружу</option></select>
        </div>
        <textarea class="comment" rows="1" placeholder="Примечание"></textarea>
    `;
    if(index!==0){
        div.querySelector('.delBlock').onclick = (e)=>{
            e.stopPropagation();
            if(blocks.length<=1) return;
            const idx = blocks.indexOf(div);
            if(idx!==-1){ blocks.splice(idx,1); div.remove(); renumber(); }
        };
    }
    const inputs = div.querySelectorAll('input, select, textarea');
    inputs.forEach(inp=>{ inp.oninput = ()=>onBlockInput(div); inp.onchange = ()=>onBlockInput(div); });
    blocks.push(div);
    document.getElementById('blocks').appendChild(div);
    renumber();
}

function onBlockInput(block){
    if(block !== blocks[blocks.length-1]) return;
    if(blocks.length >= 13) return;
    const room = block.querySelector('.roomName').value.trim();
    const h = block.querySelector('.height').value.trim();
    const w = block.querySelector('.width').value.trim();
    const d = block.querySelector('.depth').value.trim();
    const f = block.querySelector('.floor').value.trim();
    if(room || h || w || d || f) addBlock(blocks.length);
}

function renumber(){
    blocks.forEach((b,i)=>{
        b.querySelector('b').innerText = `Помещение #${i+1}`;
        const del = b.querySelector('.delBlock');
        if(del) del.style.display = i===0 ? 'none' : 'inline-block';
    });
}

function collectData(){
    let res = [];
    for(let i=0;i<blocks.length;i++){
        const b = blocks[i];
        const room = b.querySelector('.roomName').value.trim();
        const h = b.querySelector('.height').value.trim();
        const w = b.querySelector('.width').value.trim();
        const d = b.querySelector('.depth').value.trim();
        const floor = b.querySelector('.floor').value.trim();
        if(!room || !h || !w || !d || !floor) continue;
        res.push({
            address: currentAddress,
            blockNumber: i+1,
            roomName: room,
            height: parseFloat(h),
            width: parseFloat(w),
            depth: parseFloat(d),
            floorFinish: floor,
            swingSide: b.querySelector('.side').value,
            swingDirection: b.querySelector('.dir').value,
            comment: b.querySelector('.comment').value.trim()
        });
    }
    return res;
}

async function saveAll(){
    const data = collectData();
    if(data.length===0){ showMsg('status','Нет заполненных блоков','error'); return; }
    const btn = document.getElementById('saveAll');
    btn.disabled = true;
    showMsg('status','Сохранение...','');
    try{
        const res = await fetch(currentUrl, {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({blocks:data})
        });
        const json = await res.json();
        if(!res.ok || json.error) throw new Error(json.error || 'Ошибка');
        showMsg('status','✅ Сохранено '+json.saved+' помещений','success');
        setTimeout(()=>{
            document.getElementById('formPanel').style.display='none';
            document.getElementById('addressPanel').style.display='block';
            testAndInit();
        },1500);
    }catch(e){
        showMsg('status','Ошибка: '+e.message,'error');
    }finally{
        btn.disabled = false;
    }
}

function showMsg(elId, msg, type){
    const el = document.getElementById(elId);
    el.innerHTML = `<div class="${type}">${msg}</div>`;
    setTimeout(()=>{ el.innerHTML = ''; },3000);
}

document.getElementById('saveUrl').onclick = ()=>{
    const url = document.getElementById('urlInput').value.trim();
    if(!url.match(/^https:\/\/script\.google\.com\/macros\/s\/[^/]+\/exec$/)){ showMsg('connMsg','Неверный формат','error'); return; }
    setUrl(url);
    testAndInit();
};
document.getElementById('saveAll').onclick = saveAll;
testAndInit();
</script>
</body>
</html>
