<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Замеры помещений</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
        }
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity .3s;
        }
        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .app-container {
            width: 100%;
            max-width: 420px;
            height: 85vh;
            background: #0c0c0c;
            border-radius: 28px;
            border: 1px solid #222;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        .screen {
            display: none;
        }
        .screen.active {
            display: block;
        }
        button {
            width: 100%;
            padding: 16px;
            background: #36FF00;
            border: none;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 600;
            color: #000;
            cursor: pointer;
            transition: .2s;
            margin-top: 12px;
        }
        button:disabled {
            background: #2a2a2a;
            color: #666;
            cursor: not-allowed;
        }
        .address-item {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 10px;
            border: 1px solid #333;
            cursor: pointer;
            transition: .2s;
        }
        .address-item:hover, .address-item.selected {
            border-color: #36FF00;
            background: #222;
        }
        .address-title {
            font-size: 16px;
            font-weight: 500;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #aaa;
        }
        input, textarea, select {
            width: 100%;
            padding: 14px 12px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 16px;
            font-size: 16px;
            color: #fff;
            outline: none;
            font-family: inherit;
        }
        input:focus, textarea:focus, select:focus {
            border-color: #36FF00;
            box-shadow: 0 0 0 2px rgba(54,255,0,.2);
        }
        .double-select {
            display: flex;
            gap: 12px;
        }
        .double-select .form-group {
            flex: 1;
        }
        .block-header {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid #36FF00;
            font-weight: 600;
        }
        .status {
            margin-top: 12px;
            padding: 10px;
            border-radius: 60px;
            text-align: center;
            display: none;
            background: #1a1a1a;
            border: 1px solid #333;
        }
        .status.success {
            display: block;
            background: rgba(54,255,0,.15);
            color: #36FF00;
            border-color: #36FF00;
        }
        .status.error {
            display: block;
            background: rgba(255,70,70,.15);
            color: #ff4646;
            border-color: #ff4646;
        }
        .connection-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.92);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 16px;
            z-index: 2000;
        }
        .connection-overlay.show {
            display: flex;
        }
        .connection-card {
            width: 100%;
            max-width: 420px;
            background: #0c0c0c;
            border: 1px solid #222;
            border-radius: 24px;
            padding: 16px;
        }
        .connection-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .connection-hint {
            color: #aaa;
            font-size: 13px;
            margin-bottom: 12px;
        }
        .connection-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        .connection-actions button {
            margin-top: 0;
            padding: 12px;
            font-size: 14px;
        }
        .connection-actions .secondary {
            background: #444;
            color: #fff;
        }
        .connection-actions .danger {
            background: #ff4646;
            color: #fff;
        }
        .connection-status {
            margin-top: 10px;
            padding: 10px;
            border-radius: 16px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #aaa;
            display: none;
            font-size: 13px;
        }
        .connection-status.show {
            display: block;
        }
        .connection-status.error {
            color: #ff4646;
            border-color: #ff4646;
        }
        .connection-status.success {
            color: #36FF00;
            border-color: #36FF00;
        }
        .connection-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: #aaa;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            z-index: 10;
        }
        .next-block-info {
            text-align: center;
            color: #36FF00;
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="loading-screen" id="loadingScreen">
        <div style="color:#36FF00;">Загрузка...</div>
    </div>
    <div class="connection-overlay" id="connectionOverlay">
        <div class="connection-card">
            <div class="connection-title">Подключение к Google Sheets</div>
            <div class="connection-hint">Вставьте ссылку на веб-приложение Google Apps Script (формат <code>https://script.google.com/macros/s/.../exec</code>)</div>
            <input type="text" id="appUrlInput" placeholder="Вставьте ссылку">
            <div class="connection-actions">
                <button id="testConnectionBtn" class="secondary">Проверить</button>
                <button id="saveConnectionBtn">Сохранить</button>
            </div>
            <div class="connection-actions" style="margin-top:8px;">
                <button id="clearConnectionBtn" class="danger">Сбросить</button>
                <button id="cancelConnectionBtn" class="secondary">Отмена</button>
            </div>
            <div class="connection-status" id="connectionStatus"></div>
        </div>
    </div>
    <div class="app-container" id="appContainer" style="display:none;">
        <button class="connection-btn" id="connectionBtn" title="Настройки">⚙️</button>
        <div class="content-area">
            <!-- Экран выбора адреса -->
            <div id="addressScreen" class="screen">
                <h2 style="margin-bottom: 16px;">Выберите адрес</h2>
                <div id="addressList"></div>
                <div id="addressStatus" style="text-align:center; color:#aaa;"></div>
            </div>
            <!-- Экран заполнения блока -->
            <div id="formScreen" class="screen">
                <div class="block-header" id="blockHeader">Блок #1</div>
                <div class="form-group">
                    <label>Название комнаты *</label>
                    <input type="text" id="roomName" placeholder="например, Гостиная">
                </div>
                <div class="form-group">
                    <label>Высота проема (мм) *</label>
                    <input type="number" id="height" placeholder="2100">
                </div>
                <div class="form-group">
                    <label>Ширина проема (мм) *</label>
                    <input type="number" id="width" placeholder="1200">
                </div>
                <div class="form-group">
                    <label>Глубина проема (мм) *</label>
                    <input type="number" id="depth" placeholder="200">
                </div>
                <div class="form-group">
                    <label>Чистовой пол *</label>
                    <input type="text" id="floorFinish" placeholder="ламинат, плитка...">
                </div>
                <div class="double-select">
                    <div class="form-group">
                        <label>Открывание (сторона)</label>
                        <select id="swingSide">
                            <option value="Левое">Левое</option>
                            <option value="Правое">Правое</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Открывание (направление)</label>
                        <select id="swingDirection">
                            <option value="В помещение">В помещение</option>
                            <option value="Наружу">Наружу</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Примечание</label>
                    <textarea id="comment" rows="2" placeholder="необязательно"></textarea>
                </div>
                <button id="saveBlockBtn">Сохранить блок</button>
                <div id="formStatus" class="status"></div>
                <div class="next-block-info" id="nextInfo"></div>
            </div>
        </div>
    </div>

    <script>
    (function(){
        const APP_URL_KEY = 'room_app_url';
        let cachedUrl = null;
        let currentAddress = null;
        let currentBlock = 1;
        const MAX_BLOCK = 13;

        function normalizeUrl(url) {
            if (!url) return '';
            let u = String(url).trim().replace(/\s/g, '').split('?')[0].split('#')[0];
            if (u.endsWith('/')) u = u.slice(0, -1);
            return u;
        }
        function isAppsScriptUrl(url) {
            return /^https:\/\/script\.google\.com\/macros\/s\/[^/]+\/exec$/i.test(normalizeUrl(url));
        }
        function getAppUrl() {
            if (cachedUrl) return cachedUrl;
            const saved = localStorage.getItem(APP_URL_KEY);
            cachedUrl = normalizeUrl(saved) || null;
            return cachedUrl;
        }
        function saveAppUrl(url) {
            const n = normalizeUrl(url);
            localStorage.setItem(APP_URL_KEY, n);
            cachedUrl = n;
        }
        function clearAppUrl() {
            localStorage.removeItem(APP_URL_KEY);
            cachedUrl = null;
        }

        const loadingScreen = document.getElementById('loadingScreen');
        const appContainer = document.getElementById('appContainer');
        const connectionOverlay = document.getElementById('connectionOverlay');
        const connectionStatusDiv = document.getElementById('connectionStatus');
        const appUrlInput = document.getElementById('appUrlInput');
        const addressScreen = document.getElementById('addressScreen');
        const formScreen = document.getElementById('formScreen');
        const addressListDiv = document.getElementById('addressList');
        const addressStatus = document.getElementById('addressStatus');
        const blockHeader = document.getElementById('blockHeader');
        const roomNameInput = document.getElementById('roomName');
        const heightInput = document.getElementById('height');
        const widthInput = document.getElementById('width');
        const depthInput = document.getElementById('depth');
        const floorFinishInput = document.getElementById('floorFinish');
        const swingSideSelect = document.getElementById('swingSide');
        const swingDirectionSelect = document.getElementById('swingDirection');
        const commentInput = document.getElementById('comment');
        const saveBlockBtn = document.getElementById('saveBlockBtn');
        const formStatus = document.getElementById('formStatus');
        const nextInfo = document.getElementById('nextInfo');

        function showStatus(element, msg, type) {
            element.textContent = msg;
            element.className = 'status';
            if (type) element.classList.add(type);
            setTimeout(() => {
                if (element.classList.contains(type)) element.classList.remove(type);
                element.textContent = '';
                element.className = 'status';
            }, 3000);
        }

        function setConnectionStatus(msg, type) {
            connectionStatusDiv.textContent = msg || '';
            connectionStatusDiv.classList.remove('show', 'error', 'success');
            if (msg) {
                connectionStatusDiv.classList.add('show');
                if (type) connectionStatusDiv.classList.add(type);
            }
        }

        function showConnectionOverlay(allowCancel) {
            appUrlInput.value = getAppUrl() || '';
            document.getElementById('cancelConnectionBtn').style.display = allowCancel ? 'block' : 'none';
            document.getElementById('clearConnectionBtn').style.display = getAppUrl() ? 'block' : 'none';
            setConnectionStatus('');
            connectionOverlay.classList.add('show');
        }

        function hideConnectionOverlay() {
            connectionOverlay.classList.remove('show');
        }

        async function testConnection(url) {
            const u = normalizeUrl(url);
            if (!isAppsScriptUrl(u)) throw new Error('Ссылка должна быть вида https://script.google.com/macros/s/.../exec');
            const res = await fetch(`${u}?action=getAddresses`, { mode: 'cors', cache: 'no-store' });
            const data = await res.json();
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            if (data.error) throw new Error(data.error);
            return true;
        }

        async function loadAddresses() {
            const url = getAppUrl();
            if (!url) return;
            addressListDiv.innerHTML = '';
            addressStatus.textContent = 'Загрузка адресов...';
            try {
                const res = await fetch(`${url}?action=getAddresses`, { mode: 'cors', cache: 'no-store' });
                const data = await res.json();
                if (data.error) throw new Error(data.error);
                const addresses = data;
                if (!addresses.length) {
                    addressStatus.textContent = 'Нет адресов в таблице orders';
                    return;
                }
                addressStatus.textContent = '';
                addresses.forEach(addr => {
                    const div = document.createElement('div');
                    div.className = 'address-item';
                    div.innerHTML = `<div class="address-title">${escapeHtml(addr)}</div>`;
                    div.addEventListener('click', () => {
                        currentAddress = addr;
                        currentBlock = 1;
                        updateFormScreen();
                        resetForm();
                        addressScreen.classList.remove('active');
                        formScreen.classList.add('active');
                    });
                    addressListDiv.appendChild(div);
                });
            } catch (err) {
                addressStatus.textContent = 'Ошибка загрузки адресов';
                console.error(err);
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function resetForm() {
            roomNameInput.value = '';
            heightInput.value = '';
            widthInput.value = '';
            depthInput.value = '';
            floorFinishInput.value = '';
            swingSideSelect.value = 'Левое';
            swingDirectionSelect.value = 'В помещение';
            commentInput.value = '';
            formStatus.className = 'status';
            formStatus.textContent = '';
        }

        function updateFormScreen() {
            blockHeader.textContent = `Блок #${currentBlock} из ${MAX_BLOCK}`;
            if (currentBlock > MAX_BLOCK) {
                // Завершено
                formScreen.innerHTML = `<div style="text-align:center; padding:40px 20px;">
                    <h2 style="color:#36FF00;">✅ Все блоки сохранены</h2>
                    <button id="backToAddressBtn">Вернуться к адресам</button>
                </div>`;
                const backBtn = document.getElementById('backToAddressBtn');
                if (backBtn) backBtn.onclick = () => {
                    addressScreen.classList.add('active');
                    formScreen.classList.remove('active');
                    loadAddresses(); // обновим список
                };
                return;
            }
            // Восстанавливаем стандартную форму (если была заменена)
            // Просто убеждаемся, что все элементы исходной формы существуют и видимы
            // Так как форма может быть пересоздана, лучше не пересоздавать, а показать существующую
            const formGroups = document.querySelectorAll('#formScreen .form-group, #formScreen button, #formScreen .next-block-info');
            formGroups.forEach(el => el.style.display = '');
            nextInfo.textContent = currentBlock === MAX_BLOCK ? 'Это последний блок' : `После сохранения откроется блок #${currentBlock+1}`;
        }

        async function saveCurrentBlock() {
            const roomName = roomNameInput.value.trim();
            const height = heightInput.value.trim();
            const width = widthInput.value.trim();
            const depth = depthInput.value.trim();
            const floorFinish = floorFinishInput.value.trim();
            if (!roomName || !height || !width || !depth || !floorFinish) {
                showStatus(formStatus, 'Заполните все обязательные поля (*)', 'error');
                return;
            }
            if (isNaN(parseFloat(height)) || isNaN(parseFloat(width)) || isNaN(parseFloat(depth))) {
                showStatus(formStatus, 'Высота, ширина, глубина должны быть числами', 'error');
                return;
            }
            saveBlockBtn.disabled = true;
            const payload = {
                address: currentAddress,
                blockNumber: currentBlock,
                roomName: roomName,
                height: height,
                width: width,
                depth: depth,
                floorFinish: floorFinish,
                swingSide: swingSideSelect.value,
                swingDirection: swingDirectionSelect.value,
                comment: commentInput.value.trim()
            };
            try {
                const url = getAppUrl();
                const res = await fetch(url, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (data.error) throw new Error(data.error);
                showStatus(formStatus, `Блок #${currentBlock} сохранён!`, 'success');
                currentBlock++;
                if (currentBlock > MAX_BLOCK) {
                    updateFormScreen();
                } else {
                    resetForm();
                    updateFormScreen();
                }
            } catch (err) {
                showStatus(formStatus, 'Ошибка сохранения: ' + err.message, 'error');
            } finally {
                saveBlockBtn.disabled = false;
            }
        }

        async function initApp() {
            const url = getAppUrl();
            if (!url) {
                loadingScreen.classList.add('hidden');
                appContainer.style.display = 'none';
                showConnectionOverlay(false);
                return;
            }
            try {
                await testConnection(url);
                loadingScreen.classList.add('hidden');
                appContainer.style.display = 'flex';
                addressScreen.classList.add('active');
                formScreen.classList.remove('active');
                await loadAddresses();
            } catch (e) {
                loadingScreen.classList.add('hidden');
                appContainer.style.display = 'none';
                showConnectionOverlay(false);
                setConnectionStatus(`Ошибка подключения: ${e.message}`, 'error');
            }
        }

        // Обработчики
        document.getElementById('connectionBtn').addEventListener('click', () => showConnectionOverlay(true));
        document.getElementById('cancelConnectionBtn').addEventListener('click', hideConnectionOverlay);
        document.getElementById('clearConnectionBtn').addEventListener('click', () => {
            clearAppUrl();
            appContainer.style.display = 'none';
            showConnectionOverlay(false);
            setConnectionStatus('Подключение сброшено', 'success');
        });
        document.getElementById('testConnectionBtn').addEventListener('click', async () => {
            const u = appUrlInput.value;
            setConnectionStatus('Проверка...');
            try {
                await testConnection(u);
                setConnectionStatus('Подключение успешно', 'success');
            } catch (err) {
                setConnectionStatus(err.message, 'error');
            }
        });
        document.getElementById('saveConnectionBtn').addEventListener('click', async () => {
            const u = appUrlInput.value;
            setConnectionStatus('Проверка...');
            try {
                await testConnection(u);
                saveAppUrl(u);
                hideConnectionOverlay();
                await initApp();
            } catch (err) {
                setConnectionStatus(err.message, 'error');
            }
        });

        saveBlockBtn.addEventListener('click', saveCurrentBlock);

        initApp();
    })();
    </script>
</body>
</html>
